<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Liste Utilisateurs</title>
  </head>
  <body class="h-screen p-2 bg-gradient-to-br from-indigo-800 to-sky-800 overflow-hidden">
    <main class="w-full mx-auto grid h-full grid-cols-1 lg:grid-cols-12 gap-4">
      <aside class="lg:col-span-3">
        <div class="bg-transparent p-4 h-full text-white">
          <div class="px-5 py-4 flex items-center justify-between">
            <p class="text-lg font-semibold tracking-wide text-white">LOGO</p>
            <div
              class="w-10 h-10 rounded-full bg-white/20 text-white flex items-center justify-center"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="currentColor"
                class="w-5 h-5"
              >
                <path
                  fill-rule="evenodd"
                  d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5a18.683 18.683 0 01-7.812-1.7.75.75 0 01-.437-.695z"
                  clip-rule="evenodd"
                />
              </svg>
            </div>
          </div>
          <nav class="mt-4 space-y-2">
            <button
              type="button"
              id="nav-liste-semaine"
              class="block w-full rounded-lg border border-white/20 bg-white/5 text-white px-6 py-3 text-lg font-medium hover:bg-white/10 transition-colors text-left"
            >
              Liste semaine
            </button>
            <button
              type="button"
              id="nav-2toi"
              class="block w-full rounded-lg border border-white/20 bg-white/5 text-white px-6 py-3 text-lg font-medium hover:bg-white/10 transition-colors text-left"
            >
              2Toi
            </button>
          </nav>
        </div>
      </aside>

      <section
        class="lg:col-span-9 h-full p-5 flex flex-col min-h-0 bg-slate-200 rounded-xl shadow-md"
      >
        <div
          class="w-1/2 rounded-lg border border-slate-300 bg-slate-100 text-slate-800 px-4 py-3 mb-2 flex items-center justify-between gap-3 shrink-0"
        >
          <input
            class="w-full text-sm font-medium placeholder-slate-500 bg-transparent focus:outline-none"
            type="text"
            placeholder="Rechercher..."
          />
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            class="w-4 h-4 text-slate-600"
            aria-hidden="true"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35" />
            <circle cx="11" cy="11" r="6" />
          </svg>
        </div>
        <article
          id="liste-semaine"
          class="bg-slate-100 rounded-xl shadow-sm border border-slate-300 overflow-hidden flex-1 min-h-0 flex flex-col"
        >
          <div class="px-6 py-4 bg-gradient-to-br from-indigo-800 to-sky-800 text-white">
            <h2 class="text-2xl font-semibold text-white">Liste semaine</h2>
            <p class="text-sm text-indigo-100 mt-1">
              Tableau <span class="font-medium">Semaine </span>
            </p>
          </div>
          <div class="flex-1 overflow-auto">
            <table
              id="user-table"
              class="min-w-full divide-y divide-slate-300 border border-slate-300 border-collapse"
            >
              <thead class="bg-indigo-100 [&_th]:border [&_th]:border-slate-300">
                <tr>
                  <th
                    data-sort-key="nom"
                    class="sticky top-0 z-10 bg-indigo-100 px-6 py-3 text-left text-xs font-semibold text-indigo-800 uppercase tracking-wider"
                  >
                    Nom
                  </th>
                  <th
                    data-sort-key="prenom"
                    class="sticky top-0 z-10 bg-indigo-100 px-6 py-3 text-left text-xs font-semibold text-indigo-800 uppercase tracking-wider"
                  >
                    Prénom
                  </th>
                  <th
                    data-sort-key="region"
                    class="sticky top-0 z-10 bg-indigo-100 px-6 py-3 text-left text-xs font-semibold text-indigo-800 uppercase tracking-wider"
                  >
                    Région
                  </th>
                  <th
                    data-sort-key="ville"
                    class="sticky top-0 z-10 bg-indigo-100 px-6 py-3 text-left text-xs font-semibold text-indigo-800 uppercase tracking-wider"
                  >
                    Ville
                  </th>
                  <th
                    data-sort-key="numero"
                    class="sticky top-0 z-10 bg-indigo-100 px-6 py-3 text-left text-xs font-semibold text-indigo-800 uppercase tracking-wider"
                  >
                    Numéro
                  </th>
                </tr>
              </thead>
              <tbody
                id="user-table-body"
                class="bg-slate-100 divide-y divide-slate-200 [&_td]:border [&_td]:border-slate-300"
              ></tbody>
            </table>
          </div>
          <div class="px-6 py-3 border-t border-slate-300 flex items-center justify-between">
            <p id="user-pagination-info" class="text-sm text-slate-700"></p>
            <div class="flex items-center gap-2">
              <button
                type="button"
                id="user-prev-page"
                class="rounded-md border border-slate-400 px-3 py-1.5 text-sm text-slate-800 hover:bg-slate-100 disabled:opacity-50 disabled:cursor-not-allowed"
              >
                Précédent
              </button>
              <button
                type="button"
                id="user-next-page"
                class="rounded-md border border-slate-400 px-3 py-1.5 text-sm text-slate-800 hover:bg-slate-100 disabled:opacity-50 disabled:cursor-not-allowed"
              >
                Suivant
              </button>
            </div>
          </div>
        </article>

        <article
          id="section-2toi"
          class="bg-slate-100 rounded-xl shadow-sm border border-slate-300 overflow-hidden flex-1 min-h-0 flex flex-col"
        >
          <div class="px-6 py-4 bg-gradient-to-br from-indigo-800 to-sky-800 text-white">
            <h2 class="text-2xl font-semibold text-white">2 Toi</h2>
            <p class="text-sm text-violet-200 mt-1">
              Tableau <span class="font-medium">2 Toi</span>
            </p>
          </div>
          <div class="flex-1 overflow-auto">
            <table
              id="two-toi-table"
              class="min-w-full divide-y divide-slate-300 border border-slate-300 border-collapse"
            >
              <thead class="bg-indigo-100 [&_th]:border [&_th]:border-slate-300">
                <tr>
                  <th
                    data-sort-key="agent"
                    class="sticky top-0 z-10 bg-indigo-100 px-6 py-3 text-left text-xs font-semibold text-indigo-800 uppercase tracking-wider"
                  >
                    Agent
                  </th>
                  <th
                    data-sort-key="msisdn"
                    class="sticky top-0 z-10 bg-indigo-100 px-6 py-3 text-left text-xs font-semibold text-indigo-800 uppercase tracking-wider"
                  >
                    MSISDN
                  </th>
                </tr>
              </thead>
              <tbody
                id="two-toi-table-body"
                class="bg-slate-100 divide-y divide-slate-200 [&_td]:border [&_td]:border-slate-300"
              ></tbody>
            </table>
          </div>
          <div class="px-6 py-3 border-t border-slate-300 flex items-center justify-between">
            <p id="two-toi-pagination-info" class="text-sm text-slate-700"></p>
            <div class="flex items-center gap-2">
              <button
                type="button"
                id="two-toi-prev-page"
                class="rounded-md border border-slate-400 px-3 py-1.5 text-sm text-slate-800 hover:bg-slate-100 disabled:opacity-50 disabled:cursor-not-allowed"
              >
                Précédent
              </button>
              <button
                type="button"
                id="two-toi-next-page"
                class="rounded-md border border-slate-400 px-3 py-1.5 text-sm text-slate-800 hover:bg-slate-100 disabled:opacity-50 disabled:cursor-not-allowed"
              >
                Suivant
              </button>
            </div>
          </div>
        </article>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
